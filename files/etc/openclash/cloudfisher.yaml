external-ui-name: metacubexd
external-ui-url: https://codeload.github.com/MetaCubeX/metacubexd/zip/refs/heads/gh-pages
keep-alive-interval: 15
keep-alive-idle: 600
ipv6: true
geodata-mode: true
unified-delay: true
lgbm-auto-update: true
lgbm-url: https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model-large.bin
lgbm-update-interval: 72
profile:
  smart-collector-size: 1000.0
  store-selected: true
  store-fake-ip: true
geox-url:
  mmdb: https://testingcf.jsdelivr.net/gh/alecthw/mmdb_china_ip_list@release/Country.mmdb
