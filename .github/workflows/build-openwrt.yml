name: Build OpenWrt-K
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'
  push:
    paths:
      - '.github/**'
      - 'files/**'
      - 'build_helper/**'
      - 'config/**'

      - '!.gitignore'
      - '!LICENSE'
      - '!README.md'
      - '!img/**'

permissions:
  actions: write
  contents: write
  discussions: write
env:
  GITHUB_TOKEN: ${{ github.token }}
  BUILD_HELPER_DEBUG: true
jobs:

  prepare:
    outputs:
      matrix: ${{ steps.run.outputs.matrix }}
    runs-on: ubuntu-22.04
    name: 规划与准备
    steps:

      - uses: actions/checkout@v5
      
      - name: Fetch Private Configuration
        env:
          ROUTER_HOST: "wrt.ofchar.online"
          ROUTER_PORT: 8622
          ROUTER_USER: "root"
          ROUTER_PASS: ${{ secrets.ROUTER_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass expect
          # Create the necessary directories
          mkdir -p files/etc/config files/etc/openclash/custom files/etc/openclash/rule_provider
          
          # Use expect script to run SCP safely with password
          cat << 'EOF' > fetch_configs.exp
          set timeout 60
          set host $env(ROUTER_HOST)
          set port $env(ROUTER_PORT)
          set user $env(ROUTER_USER)
          set pass $env(ROUTER_PASS)

          spawn scp -P $port -o StrictHostKeyChecking=no -r $user@$host:/etc/config/argon $user@$host:/etc/config/aurora $user@$host:/etc/config/bandix $user@$host:/etc/config/cifs $user@$host:/etc/config/dhcp $user@$host:/etc/config/dhcp-opkg $user@$host:/etc/config/dropbear $user@$host:/etc/config/etherwake $user@$host:/etc/config/firewall $user@$host:/etc/config/fstab $user@$host:/etc/config/luci $user@$host:/etc/config/luci-opkg $user@$host:/etc/config/lucky $user@$host:/etc/config/lucky.daji $user@$host:/etc/config/mdadm $user@$host:/etc/config/network $user@$host:/etc/config/nlbwmon $user@$host:/etc/config/openclash $user@$host:/etc/config/openssl $user@$host:/etc/config/p910nd $user@$host:/etc/config/qosmate $user@$host:/etc/config/rpcd $user@$host:/etc/config/samba4 $user@$host:/etc/config/system $user@$host:/etc/config/turboacc $user@$host:/etc/config/uhttpd $user@$host:/etc/config/uhttpd-opkg $user@$host:/etc/config/upnpd $user@$host:/etc/config/upnpd-opkg $user@$host:/etc/config/vlmcsd $user@$host:/etc/config/watchdog $user@$host:/etc/config/wireless files/etc/config/
          expect "password:"
          send "$pass\r"
          expect eof

          spawn scp -P $port -o StrictHostKeyChecking=no -r $user@$host:/etc/openclash/custom/* files/etc/openclash/custom/
          expect "password:"
          send "$pass\r"
          expect eof
          
          spawn ssh -p $port -o StrictHostKeyChecking=no $user@$host "ls /etc/openclash/rule_provider/*chenmozhijin.yaml"
          expect "password:"
          send "$pass\r"
          expect eof
          
          spawn scp -P $port -o StrictHostKeyChecking=no $user@$host:/etc/openclash/rule_provider/*chenmozhijin.yaml files/etc/openclash/rule_provider/
          expect "password:"
          send "$pass\r"
          expect eof
          EOF
          expect fetch_configs.exp
          rm fetch_configs.exp

      - name: 建立环境
        uses: ./.github/action/prepare

      - name: 准备
        id: run
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task prepare

      - name: 上传
        uses: ./../../../../../opt/OpenWrt-K/.github/action/upload

  base-builds:
    runs-on: ubuntu-22.04
    needs: prepare
    name: 构建工具链与内核(${{ matrix.name }})
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:

      - uses: actions/checkout@v5
      - name: 建立环境
        uses: ./.github/action/prepare

      - name: 准备编译
        id: prepare
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task build-prepare --config ${{ matrix.config }}

      - name: 缓存toolchain
        uses: actions/cache@v5
        id: cache-toolchain
        if: ${{ steps.prepare.outputs.use-cache }}
        with:
          path: |
            ${{ steps.prepare.outputs.openwrt-path }}/staging_dir/host*
            ${{ steps.prepare.outputs.openwrt-path }}/staging_dir/tool*
          key: ${{ steps.prepare.outputs.toolchain-key }}

      - name: 缓存ccache
        uses: actions/cache@v5
        if: ${{ steps.prepare.outputs.use-cache }}
        with:
          path: ${{ steps.prepare.outputs.openwrt-path }}/.ccache
          key: ${{ steps.prepare.outputs.cache-key }}
          restore-keys: |
            ${{ steps.prepare.outputs.cache-restore-key }}

      - name: 编译
        id: build
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task base-builds --config ${{ matrix.config }}
        env:
          CACHE_HIT: ${{ steps.cache-toolchain.outputs.cache-hit }}

      - name: 上传
        if: success() || failure()
        uses: ./../../../../../opt/OpenWrt-K/.github/action/upload

  build-packages:
    runs-on: ubuntu-22.04
    needs: [prepare,base-builds]
    name: 构建软件包(${{ matrix.name }})
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:

      - uses: actions/checkout@v5
      - name: 建立环境
        uses: ./.github/action/prepare

      - name: 准备编译
        id: prepare
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task build-prepare --config ${{ matrix.config }}

      - name: 缓存ccache
        uses: actions/cache@v5
        if: ${{ steps.prepare.outputs.use-cache }}
        with:
          path: ${{ steps.prepare.outputs.openwrt-path }}/.ccache
          key: ${{ steps.prepare.outputs.cache-key }}
          restore-keys: |
            ${{ steps.prepare.outputs.cache-restore-key }}

      - name: 编译
        id: build
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task build_packages --config ${{ matrix.config }}

      - name: 上传
        if: success() || failure()
        uses: ./../../../../../opt/OpenWrt-K/.github/action/upload

  build-ImageBuilder:
    runs-on: ubuntu-22.04
    needs: [prepare,base-builds]
    name: 构建Image Builder与内核模块(${{ matrix.name }})
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:

      - uses: actions/checkout@v5
      - name: 建立环境
        uses: ./.github/action/prepare

      - name: 准备编译
        id: prepare
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task build-prepare --config ${{ matrix.config }}

      - name: 缓存ccache
        uses: actions/cache@v5
        if: ${{ steps.prepare.outputs.use-cache }}
        with:
          path: ${{ steps.prepare.outputs.openwrt-path }}/.ccache
          key: ${{ steps.prepare.outputs.cache-key }}
          restore-keys: |
            ${{ steps.prepare.outputs.cache-restore-key }}

      - name: 编译
        id: build
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task build_image_builder --config ${{ matrix.config }}

      - name: 上传
        if: success() || failure()
        uses: ./../../../../../opt/OpenWrt-K/.github/action/upload

  build-images-releases:
    runs-on: ubuntu-22.04
    needs: [prepare,base-builds,build-ImageBuilder,build-packages]
    name: 构建镜像并发布(${{ matrix.name }})
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:

      - uses: actions/checkout@v5
      - name: 建立环境
        uses: ./.github/action/prepare

      - name: 准备构建
        id: prepare
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task build-prepare --config ${{ matrix.config }}

      - name: 构建
        id: build
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task build_images_releases --config ${{ matrix.config }}

      - name: 上传
        if: success() || failure()
        uses: ./../../../../../opt/OpenWrt-K/.github/action/upload
