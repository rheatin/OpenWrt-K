name: Build OpenWrt-K
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'
  push:
    paths:
      - '.github/**'
      - 'files/**'
      - 'build_helper/**'
      - 'config/**'

      - '!.gitignore'
      - '!LICENSE'
      - '!README.md'
      - '!img/**'

permissions:
  actions: write
  contents: write
  discussions: write
env:
  GITHUB_TOKEN: ${{ github.token }}
  BUILD_HELPER_DEBUG: true
jobs:

  prepare:
    outputs:
      matrix: ${{ steps.run.outputs.matrix }}
    runs-on: ubuntu-22.04
    name: 规划与准备
    steps:

      - uses: actions/checkout@v5
      
      - name: Fetch Private Configuration
        env:
          ROUTER_HOST: ${{ secrets.ROUTER_HOST }}
          ROUTER_PORT: ${{ secrets.ROUTER_PORT }}
          ROUTER_USER: ${{ secrets.ROUTER_USER }}
          ROUTER_PASS: ${{ secrets.ROUTER_PASS }}
        run: |
          sudo apt-get install -y sshpass expect
          # Create the necessary directories
          mkdir -p files/etc/config files/etc/openclash
          
          # Use expect script to safely create a tarball on router, download, extract, and clean up
          cat << 'EOF' > fetch_configs.exp
          set timeout 120
          set host $env(ROUTER_HOST)
          set port $env(ROUTER_PORT)
          set user $env(ROUTER_USER)
          set pass $env(ROUTER_PASS)

          # 1. Create a tar archive on the router containing the exact files we need
          # We copy all target files to a temporary location first to prevent any 'file in use' errors during tar
          spawn ssh -p $port -o StrictHostKeyChecking=no $user@$host "rm -rf /tmp/etc_temp; mkdir -p /tmp/etc_temp/config /tmp/etc_temp/openclash/rule_provider; cd /etc && cp -rf config/argon config/aurora config/bandix config/cifs config/dhcp config/dropbear config/etherwake config/firewall config/fstab config/luci config/lucky config/lucky.daji config/mdadm config/network config/nlbwmon config/openssl config/p910nd config/qosmate config/rpcd config/samba4 config/system config/turboacc config/uhttpd config/upnpd config/vlmcsd config/watchdog config/wireless /tmp/etc_temp/config/ 2>/dev/null; cp -rf firewall.user /tmp/etc_temp/ 2>/dev/null; cp -rf openclash/overwrite openclash/custom openclash/*.yaml /tmp/etc_temp/openclash/ 2>/dev/null; cp -rf openclash/rule_provider/*chenmozhijin.yaml /tmp/etc_temp/openclash/rule_provider/ 2>/dev/null; cd /tmp/etc_temp && tar -cf /tmp/router_backup.tar config firewall.user openclash 2>/dev/null; rm -rf /tmp/etc_temp"
          expect {
            "password:" { send "$pass\r"; exp_continue }
            eof
          }
          catch {wait} result
          if {[lindex $result 3] != 0} { exit 1 }

          # 2. SCP the tarball to the local Actions runner
          spawn scp -P $port -o StrictHostKeyChecking=no $user@$host:/tmp/router_backup.tar ./router_backup.tar
          expect {
            "password:" { send "$pass\r"; exp_continue }
            eof
          }
          catch {wait} result
          if {[lindex $result 3] != 0} { exit 1 }

          # 3. Clean up the tarball on the router
          spawn ssh -p $port -o StrictHostKeyChecking=no $user@$host "rm /tmp/router_backup.tar"
          expect {
            "password:" { send "$pass\r"; exp_continue }
            eof
          }
          EOF
          
          # Run the expect script with retry logic
          SUCCESS=false
          for i in {1..3}; do
            echo "Attempt $i to fetch configuration..."
            if expect fetch_configs.exp; then
              if [ -f router_backup.tar ]; then
                SUCCESS=true
                break
              fi
            fi
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done
          
          rm fetch_configs.exp
          
          # Extract the tarball locally into the files/etc/ directory
          if [ "$SUCCESS" = "true" ]; then
            tar -xvf router_backup.tar -C files/etc/
            rm router_backup.tar
          else
            echo "Failed to download configuration backup from router after multiple attempts!"
            exit 1
          fi

      - name: 建立环境
        uses: ./.github/action/prepare

      - name: 准备
        id: run
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task prepare

      - name: 上传
        uses: ./../../../../../opt/OpenWrt-K/.github/action/upload

  base-builds:
    runs-on: ubuntu-22.04
    needs: prepare
    name: 构建工具链与内核(${{ matrix.name }})
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:

      - uses: actions/checkout@v5
      - name: 建立环境
        uses: ./.github/action/prepare

      - name: 准备编译
        id: prepare
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task build-prepare --config ${{ matrix.config }}

      - name: 缓存toolchain
        uses: actions/cache@v5
        id: cache-toolchain
        if: ${{ steps.prepare.outputs.use-cache }}
        with:
          path: |
            ${{ steps.prepare.outputs.openwrt-path }}/staging_dir/host*
            ${{ steps.prepare.outputs.openwrt-path }}/staging_dir/tool*
          key: ${{ steps.prepare.outputs.toolchain-key }}

      - name: 缓存ccache
        uses: actions/cache@v5
        if: ${{ steps.prepare.outputs.use-cache }}
        with:
          path: ${{ steps.prepare.outputs.openwrt-path }}/.ccache
          key: ${{ steps.prepare.outputs.cache-key }}
          restore-keys: |
            ${{ steps.prepare.outputs.cache-restore-key }}

      - name: 编译
        id: build
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task base-builds --config ${{ matrix.config }}
        env:
          CACHE_HIT: ${{ steps.cache-toolchain.outputs.cache-hit }}

      - name: 上传
        if: success() || failure()
        uses: ./../../../../../opt/OpenWrt-K/.github/action/upload

  build-packages:
    runs-on: ubuntu-22.04
    needs: [prepare,base-builds]
    name: 构建软件包(${{ matrix.name }})
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:

      - uses: actions/checkout@v5
      - name: 建立环境
        uses: ./.github/action/prepare

      - name: 准备编译
        id: prepare
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task build-prepare --config ${{ matrix.config }}

      - name: 缓存ccache
        uses: actions/cache@v5
        if: ${{ steps.prepare.outputs.use-cache }}
        with:
          path: ${{ steps.prepare.outputs.openwrt-path }}/.ccache
          key: ${{ steps.prepare.outputs.cache-key }}
          restore-keys: |
            ${{ steps.prepare.outputs.cache-restore-key }}

      - name: 编译
        id: build
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task build_packages --config ${{ matrix.config }}

      - name: 上传
        if: success() || failure()
        uses: ./../../../../../opt/OpenWrt-K/.github/action/upload

  build-ImageBuilder:
    runs-on: ubuntu-22.04
    needs: [prepare,base-builds]
    name: 构建Image Builder与内核模块(${{ matrix.name }})
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:

      - uses: actions/checkout@v5
      - name: 建立环境
        uses: ./.github/action/prepare

      - name: 准备编译
        id: prepare
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task build-prepare --config ${{ matrix.config }}

      - name: 缓存ccache
        uses: actions/cache@v5
        if: ${{ steps.prepare.outputs.use-cache }}
        with:
          path: ${{ steps.prepare.outputs.openwrt-path }}/.ccache
          key: ${{ steps.prepare.outputs.cache-key }}
          restore-keys: |
            ${{ steps.prepare.outputs.cache-restore-key }}

      - name: 编译
        id: build
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task build_image_builder --config ${{ matrix.config }}

      - name: 上传
        if: success() || failure()
        uses: ./../../../../../opt/OpenWrt-K/.github/action/upload

  build-images-releases:
    runs-on: ubuntu-22.04
    needs: [prepare,base-builds,build-ImageBuilder,build-packages]
    name: 构建镜像并发布(${{ matrix.name }})
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:

      - uses: actions/checkout@v5
      - name: 建立环境
        uses: ./.github/action/prepare

      - name: 准备构建
        id: prepare
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task build-prepare --config ${{ matrix.config }}

      - name: 构建
        id: build
        working-directory: /opt/OpenWrt-K
        run: python3 -m build_helper --task build_images_releases --config ${{ matrix.config }}

      - name: 上传
        if: success() || failure()
        uses: ./../../../../../opt/OpenWrt-K/.github/action/upload
